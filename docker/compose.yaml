name: navigator-admin

version: "3.9"

services:
  navigator-admin:
    container_name: navigator-admin
    image: navigator-admin:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - BACKEND_ORIGIN=http://navigator-backend:8001
    ports:
      - "5174:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:size=1m,mode=0755
      - /var/cache/nginx:size=64m,mode=0755
      - /var/run:size=4m,mode=0755
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - backend-net

networks:
  backend-net:
    name: backend-net
    external: true
